<!DOCTYPE html>
<html lang="ja">

<head>

  <script type="module" crossorigin src="./assets/index.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index.css">
</head>

<body>
    <div id="app"></div>

    <script>
        const svgCode = `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#007bff" />
            <path d="M30 50 L45 65 L70 35" stroke="#ffffff" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        `;
        const encodedSvg = encodeURIComponent(svgCode);
        const link = document.createElement('link');
        link.rel = 'icon';
        link.type = 'image/svg+xml';
        link.href = `data:image/svg+xml,${encodedSvg}`;
        document.head.appendChild(link);
    </script>
</body>

</html>
